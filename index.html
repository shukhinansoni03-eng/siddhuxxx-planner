<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Siddhu Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <!-- If you added style.css, keep this line. If not, remove it. -->
  <link rel="stylesheet" href="/style.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <style>
    /* Minimal fallback styles if style.css is missing */
    :root{--accent:#2563eb;--muted:#6b7280}
    body{font-family:'Inter',system-ui,Arial;margin:0;padding:18px;background:#f7fbff;color:#071029}
    .wrap{max-width:980px;margin:0 auto}
    header{display:flex;justify-content:space-between;align-items:center;padding:14px;border-radius:10px;background:linear-gradient(90deg,#fff,#f3f8ff);box-shadow:0 8px 24px rgba(9,30,66,0.04)}
    .btn{padding:8px 12px;border-radius:8px;border:none;cursor:pointer}
    .btn.primary{background:var(--accent);color:#fff}
    .panel{background:#fff;padding:12px;border-radius:10px;box-shadow:0 8px 24px rgba(9,30,66,0.04);margin-top:12px}
    .cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px}
    .card{padding:10px;border-radius:8px;background:rgba(255,255,255,0.8);box-shadow:0 6px 18px rgba(9,30,66,0.03)}
    .notes-list{max-height:320px;overflow:auto;margin-top:10px}
    .note{background:#fbfdff;padding:10px;border-radius:8px;margin-top:8px}
    .small{font-size:13px;color:var(--muted)}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1 style="margin:0">Siddhu Planner</h1>
        <div class="small">Timetable • Quick capture • Offline support</div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <div id="netText" class="small">Checking…</div>
        <button class="btn primary" id="openCaptureBtn">Add note</button>
      </div>
    </header>

    <main>
      <section class="panel">
        <h3 style="margin:0">Daily Timetable</h3>
        <div class="cards" id="timetableCards"></div>
      </section>

      <section class="panel">
        <h3 style="margin:0">Quick Capture</h3>
        <div style="margin-top:8px">
          <div style="display:flex;gap:8px">
            <button class="btn primary" id="openCaptureBtn2">Add note</button>
            <button class="btn" id="clearNotes">Clear</button>
          </div>
          <div class="notes-list" id="notes"></div>
        </div>
      </section>
    </main>

    <footer style="margin-top:18px" class="small">Local notes saved on your device • PWA ready</footer>
  </div>

  <div id="modalRoot"></div>

  <script>
    // --- Timetable
    const timetable = [
      ['05:00 AM','05:15 AM','Wake up & quick freshen'],
      ['05:15 AM','05:45 AM','Morning exercise'],
      ['06:00 AM','07:30 AM','Deep practice (Session 1)'],
      ['09:00 AM','02:30 PM','Coaching block'],
      ['04:00 PM','06:00 PM','Deep practice (Session 2)'],
      ['07:00 PM','08:30 PM','Evening deep practice']
    ];
    document.getElementById('timetableCards').innerHTML = timetable.map(t=>`<div class="card"><strong>${t[0]} – ${t[1]}</strong><div class="small" style="margin-top:6px">${t[2]}</div></div>`).join('');

    // --- Storage keys
    const NOTES_KEY = 'siddhu_notes_simple_v1';

    function loadNotes(){ return JSON.parse(localStorage.getItem(NOTES_KEY)||'[]'); }
    function saveNotes(list){ localStorage.setItem(NOTES_KEY, JSON.stringify(list)); renderNotes(); }

    // --- Render notes
    function renderNotes(){
      const list = loadNotes();
      const notes = document.getElementById('notes');
      if(!list.length){ notes.innerHTML = '<div class="small">No notes yet.</div>'; return; }
      notes.innerHTML = list.map((n,idx)=>`<div class="note"><div style="display:flex;justify-content:space-between"><div class="small">${new Date(n.time).toLocaleString()}</div><button onclick="deleteNote(${idx})" class="btn">Delete</button></div><div style="margin-top:8px">${escapeHtml(n.text)}</div></div>`).join('');
    }
    function escapeHtml(s){ return String(s).replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;'); }

    // --- Modal add
    function openAddModal(){
      const root = document.getElementById('modalRoot');
      const container = document.createElement('div');
      container.style.position='fixed';container.style.inset=0;container.style.background='rgba(0,0,0,0.4)';container.style.display='flex';container.style.alignItems='center';container.style.justifyContent='center';container.style.zIndex=9999;
      container.innerHTML = `<div style="background:#fff;padding:14px;border-radius:10px;max-width:520px;width:92%"><h3 style="margin:0">Add note</h3><textarea id="noteText" style="width:100%;height:100px;margin-top:8px;padding:8px;border-radius:6px;border:1px solid #e6eefc"></textarea><div style="display:flex;gap:8px;justify-content:flex-end;margin-top:8px"><button id="cancel" class="btn">Cancel</button><button id="save" class="btn primary">Save</button></div></div>`;
      root.appendChild(container);
      container.querySelector('#cancel').onclick = ()=>container.remove();
      container.querySelector('#save').onclick = ()=>{
        const text = container.querySelector('#noteText').value.trim();
        if(!text) return alert('Type a note');
        const list = loadNotes();
        list.unshift({text, time: new Date().toISOString()});
        saveNotes(list);
        container.remove();
      };
    }
    document.getElementById('openCaptureBtn').onclick = openAddModal;
    document.getElementById('openCaptureBtn2').onclick = openAddModal;

    function deleteNote(i){ const list = loadNotes(); list.splice(i,1); saveNotes(list); }

    // --- Network status (simple)
    function updateNetworkUI(){ document.getElementById('netText').textContent = navigator.onLine ? 'Online' : 'Offline'; }
    window.addEventListener('online', updateNetworkUI); window.addEventListener('offline', updateNetworkUI);
    updateNetworkUI();

    // --- Init
    renderNotes();

    // --- Service worker registration (if you have sw.js)
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').catch(()=>{ /* ignore */ });
    }
  </script>
</body>
</html>
